<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestor de Notas Privadas — Crea, edita y organiza tus notas de forma segura.">
    <title>Gestor de Notas Privadas</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark-custom sticky-top" id="main-navbar">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-journal-text me-2"></i>MisNotas
            </a>
            <div id="nav-user-section" class="d-none">
                <span id="nav-user-email" class="text-light-accent me-3"></span>
                <button class="btn btn-outline-light btn-sm" id="btn-logout">
                    <i class="bi bi-box-arrow-right me-1"></i>Salir
                </button>
            </div>
        </div>
    </nav>

    <!-- ===== AUTH SECTION ===== -->
    <section id="auth-section" class="min-vh-100 d-flex align-items-center justify-content-center">
        <div class="auth-card">
            <div class="text-center mb-4">
                <div class="auth-icon-container mb-3">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h1 class="h3 fw-bold" id="auth-title">Iniciar Sesión</h1>
                <p class="text-muted" id="auth-subtitle">Accede a tus notas privadas</p>
            </div>

            <div id="auth-alert" class="alert d-none" role="alert"></div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="mb-3">
                    <label for="login-email" class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="login-email"
                               placeholder="tu@email.com" required autocomplete="email">
                    </div>
                </div>
                <div class="mb-4">
                    <label for="login-password" class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="login-password"
                               placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 mb-3" id="btn-login">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                </button>
            </form>

            <!-- Register Form (hidden by default) -->
            <form id="register-form" class="d-none">
                <div class="mb-3">
                    <label for="register-email" class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="register-email"
                               placeholder="tu@email.com" required autocomplete="email">
                    </div>
                </div>
                <div class="mb-3">
                    <label for="register-password" class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="register-password"
                               placeholder="Mínimo 8 caracteres" required minlength="8" autocomplete="new-password">
                    </div>
                </div>
                <div class="mb-4">
                    <label for="register-password-confirm" class="form-label">Confirmar contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control" id="register-password-confirm"
                               placeholder="Repite la contraseña" required minlength="8" autocomplete="new-password">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 mb-3" id="btn-register">
                    <i class="bi bi-person-plus me-2"></i>Crear cuenta
                </button>
            </form>

            <div class="text-center">
                <small class="text-muted" id="auth-toggle-text">
                    ¿No tienes cuenta?
                    <a href="#" id="auth-toggle" class="text-decoration-none fw-semibold">Regístrate</a>
                </small>
            </div>
        </div>
    </section>

    <!-- ===== NOTES DASHBOARD ===== -->
    <section id="notes-section" class="d-none py-4">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">
                    <i class="bi bi-collection me-2"></i>Mis Notas
                </h2>
                <button class="btn btn-primary-custom" id="btn-new-note">
                    <i class="bi bi-plus-lg me-1"></i>Nueva Nota
                </button>
            </div>

            <div id="notes-alert" class="alert d-none" role="alert"></div>

            <!-- Notes grid -->
            <div id="notes-container" class="row g-3"></div>

            <!-- Empty state -->
            <div id="notes-empty" class="text-center py-5 d-none">
                <div class="empty-state-icon mb-3">
                    <i class="bi bi-journal-plus"></i>
                </div>
                <h4 class="text-muted">No tienes notas todavía</h4>
                <p class="text-muted">Haz clic en "Nueva Nota" para empezar</p>
            </div>

            <!-- Loading spinner -->
            <div id="notes-loading" class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== NOTE MODAL ===== -->
    <div class="modal fade" id="note-modal" tabindex="-1" aria-labelledby="note-modal-title" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="note-modal-title">Nueva Nota</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <form id="note-form">
                        <input type="hidden" id="note-id">
                        <div class="mb-3">
                            <label for="note-titulo" class="form-label fw-semibold">Título</label>
                            <input type="text" class="form-control" id="note-titulo"
                                   placeholder="Título de tu nota" required maxlength="200">
                            <div class="form-text"><span id="titulo-count">0</span>/200</div>
                        </div>
                        <div class="mb-3">
                            <label for="note-contenido" class="form-label fw-semibold">Contenido</label>
                            <textarea class="form-control" id="note-contenido" rows="10"
                                      placeholder="Escribe aquí tu nota..." required maxlength="50000"></textarea>
                            <div class="form-text"><span id="contenido-count">0</span>/50000</div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary-custom" id="btn-save-note">
                        <i class="bi bi-check-lg me-1"></i>Guardar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== DELETE CONFIRM MODAL ===== -->
    <div class="modal fade" id="delete-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold text-danger">
                        <i class="bi bi-exclamation-triangle me-2"></i>Eliminar nota
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <p>¿Estás seguro de que quieres eliminar esta nota? Esta acción no se puede deshacer.</p>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger btn-sm" id="btn-confirm-delete">
                        <i class="bi bi-trash me-1"></i>Eliminar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
